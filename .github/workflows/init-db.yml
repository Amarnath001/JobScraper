name: Init database (one-time)

on:
  workflow_dispatch:

concurrency:
  group: init-db
  cancel-in-progress: false

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_ENV: production
      PLAYWRIGHT_HEADLESS: "true"
      SCRAPE_TIMEOUT_SECONDS: "90"
      LOG_LEVEL: INFO
      US_ONLY_MODE: "true"
      # Faster bulk discovery in CI (still rate-limited)
      DISCOVERY_DELAY_SECONDS: "1"
      DISCOVERY_MAX_FOLLOW: "5"
      GENERIC_PLAYWRIGHT_ENABLED: "true"
      GENERIC_PLAYWRIGHT_MAX_COMPANIES_PER_RUN: "25"
      GENERIC_PLAYWRIGHT_MAX_PAGES_PER_COMPANY: "5"
      GENERIC_PLAYWRIGHT_TIMEOUT_SECONDS: "45"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies and Playwright Chromium
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Apply database migrations
        run: |
          set -euo pipefail
          alembic upgrade head

      - name: Import company targets from CSV
        run: |
          set -euo pipefail
          python scripts/import_company_targets.py

      - name: Discover ATS for unconfigured companies
        run: |
          set -euo pipefail
          python scripts/discover_unconfigured_companies.py --limit 300

      - name: Enable generic Playwright for remaining unconfigured
        run: |
          set -euo pipefail
          python scripts/enable_generic_for_unconfigured.py --limit 300

      - name: Validate all companies and enable valid sources
        run: |
          set -euo pipefail
          python scripts/validate_companies.py --all --enable-valid

      - name: Print database company summary
        run: |
          set -euo pipefail
          python scripts/db_company_summary.py
